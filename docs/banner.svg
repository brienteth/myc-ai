<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a12" />
      <stop offset="100%" stop-color="#06060a" />
    </radialGradient>

    <!-- Green Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Thread Glow -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Organic Mycelium Network (Right Side) -->
  <g transform="translate(650, 80)">
    <!-- Root Threads (Curved Paths) -->
    <!-- Thread Group 1 (Faded background threads) -->
    <path d="M 50,300 Q 150,250 200,380 T 350,300" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-opacity="0.15" />
    <path d="M -100,200 Q 20,250 80,120 T 250,180" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-opacity="0.15" />
    <path d="M 120,50 Q 250,120 200,320 T 400,420" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-opacity="0.1" />

    <!-- Thread Group 2 (Primary threads) -->
    <path d="M -200,280 Q -100,220 0,250 T 150,150 T 300,220" fill="none" stroke="#00e87a" stroke-width="2.5" stroke-opacity="0.6" filter="url(#subtleGlow)" />
    <path d="M 0,250 Q 50,380 120,320 T 250,380" fill="none" stroke="#00e87a" stroke-width="2" stroke-opacity="0.5" />
    <path d="M 150,150 Q 180,50 280,80" fill="none" stroke="#00e87a" stroke-width="2" stroke-opacity="0.4" />
    <path d="M -100,220 Q -50,120 50,120" fill="none" stroke="#00e87a" stroke-width="1.8" stroke-opacity="0.4" />
    <path d="M 120,320 Q 80,450 180,470" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-opacity="0.3" />

    <!-- Core Glowing Threads -->
    <path d="M -200,280 Q -120,350 -50,300 T 120,320" fill="none" stroke="#00e87a" stroke-width="3" stroke-opacity="0.8" filter="url(#glow)" />
    <path d="M -50,300 Q 20,200 150,150" fill="none" stroke="#00e87a" stroke-width="2.2" stroke-opacity="0.7" filter="url(#subtleGlow)" />

    <!-- Network Nodes (Circles) -->
    <!-- Background small nodes -->
    <circle cx="350" cy="300" r="4" fill="#00e87a" fill-opacity="0.3" />
    <circle cx="250" cy="180" r="5" fill="#00e87a" fill-opacity="0.4" />
    <circle cx="400" cy="420" r="3" fill="#00e87a" fill-opacity="0.2" />
    <circle cx="50" cy="120" r="5" fill="#00e87a" fill-opacity="0.4" />
    <circle cx="280" cy="80" r="6" fill="#00e87a" fill-opacity="0.5" />
    <circle cx="180" cy="470" r="4" fill="#00e87a" fill-opacity="0.3" />

    <!-- Primary glowing nodes -->
    <circle cx="-200" cy="280" r="9" fill="#00e87a" filter="url(#glow)" />
    <circle cx="-50" cy="300" r="8" fill="#00e87a" filter="url(#subtleGlow)" />
    <circle cx="0" cy="250" r="7" fill="#00e87a" />
    <circle cx="120" cy="320" r="9" fill="#00e87a" filter="url(#glow)" />
    <circle cx="150" cy="150" r="8" fill="#00e87a" filter="url(#subtleGlow)" />
    <circle cx="300" cy="220" r="6" fill="#00e87a" />
    <circle cx="250" cy="380" r="7" fill="#00e87a" />
  </g>

  <!-- Left Side Branding Content -->
  <g transform="translate(100, 0)">
    <!-- Main Logotype (lowercase, serif italic) -->
    <text x="0" y="270" font-family="'Instrument Serif', 'Georgia', serif" font-size="130" font-style="italic" fill="#f0f0f0" letter-spacing="-2">
      myc
    </text>

    <!-- Subheadline/Tagline -->
    <text x="5" y="360" font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="600" fill="#00e87a" letter-spacing="-0.5">
      The internet, but alive.
    </text>

    <!-- Supporting sentence -->
    <text x="5" y="410" font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#5a5a6e" letter-spacing="0">
      Open-source, private P2P intelligence network.
    </text>
  </g>

  <!-- Bottom Details -->
  <rect x="100" y="520" width="1000" height="1" fill="#1e1e28" opacity="0.5" />
  <text x="100" y="565" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5a5a6e" letter-spacing="3">
    SECURE · DECENTRALIZED · INTENT-NATIVE
  </text>
</svg>
