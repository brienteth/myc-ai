name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd desktop
          npm ci || npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build Python Backend
        shell: bash
        run: |
          cd ai-layer
          $HOME/.cargo/bin/uv pip install --system -r requirements.txt
          $HOME/.cargo/bin/uv pip install --system pyinstaller
          $HOME/.cargo/bin/uv run pyinstaller main.py --name myca-backend --onefile --noconfirm
          mkdir -p ../desktop/backend-dist
          cp dist/myca-backend* ../desktop/backend-dist/

      - name: Package & Publish to GitHub Releases
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_root: desktop
          release: true
