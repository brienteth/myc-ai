<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a14" />
      <stop offset="100%" stop-color="#06060a" />
    </radialGradient>

    <!-- Green Glow Effect -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Base Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" stroke="#1e1e28" stroke-width="6" />

  <!-- Organic Mycorrhizal "m" Shape -->
  <g filter="url(#greenGlow)">
    <!-- Main curving stems of the lowercase "m" designed as organic root threads -->
    <!-- Left stem -->
    <path d="M 160,340 C 160,260 170,200 175,180" fill="none" stroke="#00e87a" stroke-width="16" stroke-linecap="round" />
    <circle cx="160" cy="340" r="10" fill="#00e87a" />
    <circle cx="175" cy="180" r="9" fill="#00e87a" />

    <!-- Left to Middle Arch -->
    <path d="M 175,180 C 185,140 235,140 245,190 L 245,330" fill="none" stroke="#00e87a" stroke-width="16" stroke-linecap="round" />
    <circle cx="245" cy="330" r="9" fill="#00e87a" />

    <!-- Middle to Right Arch -->
    <path d="M 245,190 C 255,140 305,140 315,185 L 315,310 C 315,330 330,340 345,340" fill="none" stroke="#00e87a" stroke-width="16" stroke-linecap="round" />
    <circle cx="345" cy="340" r="10" fill="#00e87a" />

    <!-- Organic branching root details growing from the "m" structure -->
    <path d="M 210,155 C 225,120 250,110 270,120" fill="none" stroke="#00e87a" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <circle cx="270" cy="120" r="4" fill="#00e87a" opacity="0.6" />

    <path d="M 165,240 C 140,230 115,250 100,270" fill="none" stroke="#00e87a" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    <circle cx="100" cy="270" r="3" fill="#00e87a" opacity="0.5" />

    <path d="M 315,240 C 340,240 365,220 380,190" fill="none" stroke="#00e87a" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    <circle cx="380" cy="190" r="3" fill="#00e87a" opacity="0.5" />

    <path d="M 245,260 C 270,285 285,310 280,335" fill="none" stroke="#00e87a" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  </g>
</svg>
